workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - lint
  - build
  - release
  - publish

.tags: &tags
  - docker
  - linux

.docker:
  image: wandelbots.azurecr.io/docker.io/library/docker:28
  tags: *tags
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  services:
    - name: wandelbots.azurecr.io/docker.io/library/docker:28-dind
      alias: docker
      command: ["--tls=false"]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker login -u $PUBLIC_REGISTRY_CI_PULL_TOKEN_USERNAME -p $PUBLIC_REGISTRY_CI_PULL_TOKEN $PUBLIC_REGISTRY_HOST

variables:
  SERVICE_NAME: rerun-viewer
  REGISTRY_IMAGE: wandelbots.azurecr.io/nova-apps/rerun-gateway
  LOGGER_SERVICE_NAME: rerun-logger-test
  LOGGER_REGISTRY_IMAGE: wandelbots.azurecr.io/nova-apps/rerun-logger

lint:merge-request:
  stage: lint
  image: wandelbots.azurecr.io/docker.io/library/alpine:latest
  tags: *tags
  rules:
    - if: $CI_MERGE_REQUEST_TITLE
  variables:
    REGEX: '^(Draft:\s*)?(feat|fix|chore)(!|\([^\)]+\)!?)?: .+$'
  script:
    - echo "Validating Merge Request title..."
    - echo "$CI_MERGE_REQUEST_TITLE"
    - |
      if echo "$CI_MERGE_REQUEST_TITLE" | grep -Eq "$REGEX"; then
        echo "Merge Request title follows the Conventional Commits format."
      else
        echo "Merge Request title does not follow the Conventional Commits format."
        echo "Expected pattern: feat|fix|chore(scope): description"
        exit 1
      fi

build:image:
  stage: build
  extends: .docker
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - docker buildx build
      --platform linux/amd64
      -t ${CI_REGISTRY_IMAGE}/${SERVICE_NAME}:${CI_COMMIT_SHORT_SHA}
      -f ${SERVICE_NAME}/Dockerfile
      --push
      ${SERVICE_NAME}/

build:logger-image:
  stage: build
  extends: .docker
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - docker buildx build
      --platform linux/amd64
      -t ${CI_REGISTRY_IMAGE}/${LOGGER_SERVICE_NAME}:${CI_COMMIT_SHORT_SHA}
      -f ${LOGGER_SERVICE_NAME}/Dockerfile
      --push
      ${LOGGER_SERVICE_NAME}/

semantic-release:
  stage: release
  image: wandelbots.azurecr.io/docker.io/library/node:22-alpine
  tags: *tags
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    GITLAB_TOKEN: ${SEMANTIC_RELEASE_TOKEN}
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
    - npm install -g semantic-release @semantic-release/changelog @semantic-release/gitlab conventional-changelog-conventionalcommits
  script:
    - npx semantic-release

publish:image:
  stage: publish
  extends: .docker
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  needs:
    - build:image
  script:
    - docker login -u $PUBLIC_REGISTRY_CI_SCOPE_NOVA_APPS_USERNAME -p $PUBLIC_REGISTRY_CI_SCOPE_NOVA_APPS_PASSWORD $PUBLIC_REGISTRY_HOST
    - VERSION=${CI_COMMIT_TAG#v}
    - docker pull ${CI_REGISTRY_IMAGE}/${SERVICE_NAME}:${CI_COMMIT_SHORT_SHA}
    - docker tag ${CI_REGISTRY_IMAGE}/${SERVICE_NAME}:${CI_COMMIT_SHORT_SHA} ${REGISTRY_IMAGE}:${VERSION}
    - docker push ${REGISTRY_IMAGE}:${VERSION}

publish:logger-image:
  stage: publish
  extends: .docker
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  needs:
    - build:logger-image
  script:
    - docker login -u $PUBLIC_REGISTRY_CI_SCOPE_NOVA_APPS_USERNAME -p $PUBLIC_REGISTRY_CI_SCOPE_NOVA_APPS_PASSWORD $PUBLIC_REGISTRY_HOST
    - VERSION=${CI_COMMIT_TAG#v}
    - docker pull ${CI_REGISTRY_IMAGE}/${LOGGER_SERVICE_NAME}:${CI_COMMIT_SHORT_SHA}
    - docker tag ${CI_REGISTRY_IMAGE}/${LOGGER_SERVICE_NAME}:${CI_COMMIT_SHORT_SHA} ${LOGGER_REGISTRY_IMAGE}:${VERSION}
    - docker push ${LOGGER_REGISTRY_IMAGE}:${VERSION}
