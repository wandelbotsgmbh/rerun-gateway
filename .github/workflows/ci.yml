name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: wandelbots.azurecr.io
  REGISTRY_IMAGE_BASE: wandelbots.azurecr.io/nova-apps
  VIEWER_NAME: rerun-viewer
  LOGGER_NAME: rerun-logger-test
  VIEWER_PUBLIC_IMAGE: wandelbots.azurecr.io/nova-apps/rerun-gateway
  LOGGER_PUBLIC_IMAGE: wandelbots.azurecr.io/nova-apps/rerun-logger

jobs:
  lint-pr-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate PR title (Conventional Commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          REGEX='^(Draft:\s*)?(feat|fix|chore)(!|\([^\)]+\)!?)?: .+$'
          echo "Title: $PR_TITLE"
          if echo "$PR_TITLE" | grep -Eq "$REGEX"; then
            echo "PR title follows Conventional Commits."
          else
            echo "PR title does not follow Conventional Commits."
            echo "Expected pattern: feat|fix|chore(scope): description"
            exit 1
          fi

  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true)
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: rerun-gateway
            context: ./rerun-viewer
            dockerfile: ./rerun-viewer/Dockerfile
            internal_repo: nova-apps/rerun-gateway/rerun-viewer
            public_repo: nova-apps/rerun-gateway
          - name: rerun-logger
            context: ./rerun-logger-test
            dockerfile: ./rerun-logger-test/Dockerfile
            internal_repo: nova-apps/rerun-gateway/rerun-logger-test
            public_repo: nova-apps/rerun-logger
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.PUBLIC_REGISTRY_CI_SCOPE_NOVA_APPS_USERNAME }}
          password: ${{ secrets.PUBLIC_REGISTRY_CI_SCOPE_NOVA_APPS_PASSWORD }}

      - name: Compute tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          INTERNAL="${REGISTRY}/${{ matrix.image.internal_repo }}"
          PUBLIC="${REGISTRY}/${{ matrix.image.public_repo }}"
          TAGS="${INTERNAL}:${SHORT_SHA}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${TAGS}
          ${PUBLIC}:${VERSION}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github conventional-changelog-conventionalcommits

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  update-catalog:
    name: Update catalog
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Trigger catalog update
        env:
          CATALOG_GITHUB_TOKEN: ${{ secrets.CATALOG_GITHUB_TOKEN }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          curl -fL \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${CATALOG_GITHUB_TOKEN}" \
            https://api.github.com/repos/wandelbotsgmbh/catalog/dispatches \
            -d "{\"event_type\": \"update-entry\",
                 \"client_payload\": {
                   \"image\":\"${{ env.VIEWER_PUBLIC_IMAGE }}:${VERSION}\",
                   \"version\":\"${VERSION}\",
                   \"preview\":\"0\",
                   \"entry\":\"rerun-gateway\"
                }
              }"
