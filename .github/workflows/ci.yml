name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Only cancel superseded PR runs. On main/tags the release job pushes a
  # `chore(release)` commit + tag back, which lands in the same concurrency
  # group — cancelling there would kill the in-progress release/publish.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io

jobs:
  lint-pr-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate PR title (Conventional Commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Types from @commitlint/config-conventional.
          REGEX='^(Draft:\s*)?(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([^\)]+\))?!?: .+$'
          echo "Title: $PR_TITLE"
          if echo "$PR_TITLE" | grep -Eq "$REGEX"; then
            echo "OK"
          else
            echo "PR title must follow Conventional Commits: <type>(<scope>)?: <subject>"
            echo "Allowed types: build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test"
            exit 1
          fi

  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true)
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: rerun-gateway
            context: ./rerun-gateway
          - name: rerun-logger
            context: ./rerun-logger-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.context }}/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Check build matrix
        run: |
          result="${{ needs.build.result }}"
          echo "build=$result"
          case "$result" in
            success|skipped) echo "OK" ;;
            *) echo "build failed: $result"; exit 1 ;;
          esac

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            conventional-changelog-conventionalcommits
          npx semantic-release

  update-catalog:
    name: Update catalog
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Trigger catalog update
        env:
          CATALOG_GITHUB_TOKEN: ${{ secrets.CATALOG_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Catalog entry points at the ACR proxy in front of GHCR so cluster
          # nodes can pull without per-cluster GHCR credentials. Build/push
          # above still target GHCR directly (authoritative source).
          IMAGE="wandelbots.azurecr.io/${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/rerun-gateway:${VERSION}"
          curl -fL --retry 3 \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${CATALOG_GITHUB_TOKEN}" \
            https://api.github.com/repos/wandelbotsgmbh/catalog/dispatches \
            -d @- <<EOF
          {
            "event_type": "update-entry",
            "client_payload": {
              "image": "${IMAGE}",
              "version": "${VERSION}",
              "preview": "0",
              "entry": "rerun-gateway"
            }
          }
          EOF
