apiVersion: wandelbots.com/v1alpha1
kind: App
metadata:
  name: rerun-logger
  namespace: cell
spec:
  appIcon: "app-icon.png"
  cellName: cell
  image: wandelbots.azurecr.io/ghcr.io/wandelbotsgmbh/rerun-logger:1.0.0
  port: 8080
  healthPath: /
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
