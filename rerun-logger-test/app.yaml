apiVersion: wandelbots.com/v1alpha1
kind: App
metadata:
  name: rerun-logger
  namespace: cell
spec:
  appIcon: "https://raw.githubusercontent.com/rerun-io/rerun/main/crates/viewer/re_ui/data/logo_dark_mode.png"
  cellName: cell
  image: wandelbots.azurecr.io/rerun-logger:latest
  port: 8080
  healthPath: /healthz
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
